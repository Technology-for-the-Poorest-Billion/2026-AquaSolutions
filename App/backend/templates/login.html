<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — water-safety pipeline</title>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #181b22;
            --text: #e6e7eb;
            --muted: #8a92a3;
            --accent: #5ec8a8;
            --danger: #ff6b6b;
            --border: #262a33;
            --input-bg: #11141a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        main {
            width: 100%;
            max-width: 380px;
            padding: 24px;
        }
        .brand {
            text-align: center;
            margin-bottom: 24px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }
        .brand h1 {
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }
        form {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 16px;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 10px 12px;
            background: var(--accent);
            color: #0f1115;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { filter: brightness(1.1); }
        .error {
            background: rgba(255, 107, 107, 0.12);
            color: var(--danger);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <div class="brand">
            <h1>Water-safety pipeline</h1>
            <div>Faecal-contamination risk + community illness signal.<br>NOT a cholera detector.</div>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" autofocus required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
            <button type="submit">Sign in</button>
        </form>
        <div class="footer">
            Sign in as a government official to view the station-status dashboard, or as a medical professional to file an illness report.
        </div>
    </main>
</body>
</html>
